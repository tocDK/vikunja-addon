worker_processes 1;
pid /tmp/nginx.pid;
error_log /dev/stderr;

events {
    worker_connections 128;
}

http {
    access_log off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8099;

        # Only accept connections from the HA Supervisor
        allow 172.30.32.2;
        deny all;

        location / {
            proxy_pass http://127.0.0.1:3456;

            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable gzip from upstream so sub_filter can process
            proxy_set_header Accept-Encoding "";

            # Rewrite absolute paths to ingress-relative paths
            # X-Ingress-Path contains the ingress base (e.g. /api/hassio_ingress/TOKEN)
            sub_filter_once off;
            sub_filter 'href="/' 'href="$http_x_ingress_path/';
            sub_filter 'src="/' 'src="$http_x_ingress_path/';
            sub_filter 'action="/' 'action="$http_x_ingress_path/';

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Timeouts
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
