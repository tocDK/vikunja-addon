name: Vikunja
version: "2.1.0"
slug: vikunja
description: Self-hosted task management for your household
url: https://github.com/tocDK/vikunja-addon
image: ghcr.io/tocdk/{arch}-addon-vikunja
arch:
  - amd64
  - aarch64
init: false
webui: http://[HOST]:[PORT:3456]
ports:
  "3456/tcp": 3456
ports_description:
  "3456/tcp": Vikunja web interface
options:
  enable_registration: true
schema:
  external_url: str?
  enable_registration: bool
startup: application
boot: auto
stage: experimental
