worker_processes 1;
pid /tmp/nginx-ingress.pid;
error_log /dev/stderr warn;

events {
    worker_connections 128;
}

http {
    access_log off;

    map $http_x_ingress_path $ingress_path {
        default $http_x_ingress_path;
        ""      "";
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8099;

        allow 172.30.32.2;
        deny all;

        location / {
            proxy_pass http://127.0.0.1:3456;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Accept-Encoding "";

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            sub_filter_once off;
            sub_filter_types text/html;

            # Rewrite absolute asset paths
            sub_filter 'src="/assets/' 'src="$ingress_path/assets/';
            sub_filter 'href="/assets/' 'href="$ingress_path/assets/';
            sub_filter 'href="/favicon.ico' 'href="$ingress_path/favicon.ico';
            sub_filter 'href="/images/' 'href="$ingress_path/images/';
            sub_filter 'href="/manifest.webmanifest' 'href="$ingress_path/manifest.webmanifest';

            # Inject script to set API URL for ingress before app loads
            sub_filter '</head>' '<script>localStorage.setItem("API_URL","$ingress_path/api/v1");</script></head>';
        }
    }
}
